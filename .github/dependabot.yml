# ESF-035: keep dependencies + pinned action SHAs current.
# uv ecosystem reads pyproject.toml + uv.lock natively (GA Mar 2025).
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
